name: InnerOS CI/CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/liuweixin97/inneros

jobs:
  test-build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm install
      - run: npm run lint
      - run: npm run build
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Upload compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: /opt/inneros

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.0
        env:
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          INITIAL_OWNER_PASSWORD: ${{ secrets.INITIAL_OWNER_PASSWORD }}
          INNEROS_DOMAIN: ${{ secrets.INNEROS_DOMAIN }}
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_MODEL: ${{ secrets.AI_MODEL }}
          DASHSCOPE_API_KEY: ${{ secrets.DASHSCOPE_API_KEY }}
          EMBEDDING_PROVIDER: ${{ secrets.EMBEDDING_PROVIDER }}
          EMBEDDING_BASE_URL: ${{ secrets.EMBEDDING_BASE_URL }}
          EMBEDDING_MODEL: ${{ secrets.EMBEDDING_MODEL }}
          EMBEDDING_DIMENSIONS: ${{ secrets.EMBEDDING_DIMENSIONS }}
          RERANK_PROVIDER: ${{ secrets.RERANK_PROVIDER }}
          RERANK_BASE_URL: ${{ secrets.RERANK_BASE_URL }}
          RERANK_MODEL: ${{ secrets.RERANK_MODEL }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          envs: AUTH_SECRET,INITIAL_OWNER_PASSWORD,INNEROS_DOMAIN,AI_API_KEY,AI_BASE_URL,AI_MODEL,DASHSCOPE_API_KEY,EMBEDDING_PROVIDER,EMBEDDING_BASE_URL,EMBEDDING_MODEL,EMBEDDING_DIMENSIONS,RERANK_PROVIDER,RERANK_BASE_URL,RERANK_MODEL
          script: |
            set -e
            mkdir -p /opt/inneros
            cd /opt/inneros
            cat > .env <<EOF
            AUTH_SECRET=$AUTH_SECRET
            INITIAL_OWNER_PASSWORD=$INITIAL_OWNER_PASSWORD
            INNEROS_DOMAIN=$INNEROS_DOMAIN
            AI_API_KEY=$AI_API_KEY
            AI_BASE_URL=$AI_BASE_URL
            AI_MODEL=$AI_MODEL
            DASHSCOPE_API_KEY=$DASHSCOPE_API_KEY
            EMBEDDING_PROVIDER=$EMBEDDING_PROVIDER
            EMBEDDING_BASE_URL=$EMBEDDING_BASE_URL
            EMBEDDING_MODEL=$EMBEDDING_MODEL
            EMBEDDING_DIMENSIONS=$EMBEDDING_DIMENSIONS
            RERANK_PROVIDER=$RERANK_PROVIDER
            RERANK_BASE_URL=$RERANK_BASE_URL
            RERANK_MODEL=$RERANK_MODEL
            EOF
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GITHUB_TOKEN }}
            docker pull ${{ env.IMAGE_NAME }}:latest
            docker compose up -d
            docker compose exec -T inneros node scripts/seed-owner.mjs
