name: InnerOS Guest Cleanup

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup guest data on server
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /opt/inneros
            docker compose exec -T inneros npm run cleanup:guest
